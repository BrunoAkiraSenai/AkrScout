# =============================================================================
# AKR Scout — Automated Job Scraper Pipeline
# =============================================================================
# Runs the Python scraping pipeline to collect tech job listings and
# update the Supabase database with fresh data.
#
# Triggers:
#   - schedule:  Daily at 06:00 UTC
#   - workflow_dispatch:  Manual trigger from GitHub UI
#
# Secrets required (GitHub → Settings → Secrets and variables → Actions):
#   SUPABASE_URL         Your Supabase project URL
#   SUPABASE_SERVICE_KEY Your Supabase service_role key (full access)
# =============================================================================

name: AKR Scout — Scraper Pipeline

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: "Logging level (DEBUG, INFO, WARNING)"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING

env:
  PYTHON_VERSION: "3.12"

jobs:
  scrape:
    name: Scrape & Ingest Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: python

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Commit & branch debug
      # ------------------------------------------------------------------
      - name: Debug commit info
        run: |
          echo "::group::Commit Debug"
          echo "Commit SHA:  $(git rev-parse HEAD)"
          echo "Branch:      $(git rev-parse --abbrev-ref HEAD)"
          echo "Trigger:     ${{ github.event_name }}"
          echo "Workflow:    ${{ github.workflow }}"
          echo "Run ID:      ${{ github.run_id }}"
          echo ""
          echo "Recent commits:"
          git log --oneline -5
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # 3. Verify working directory
      # ------------------------------------------------------------------
      - name: Verify workspace
        run: |
          echo "::group::Workspace Check"
          echo "pwd: $(pwd)"
          echo "scraper version:"
          head -5 scrapers/indeed.py | grep -i "import\|version\|modified" || true
          git log -1 --format="Last modified: %ai | %s" -- scrapers/indeed.py
          echo "requirements diff from default branch:"
          diff <(git show HEAD~1:requirements.txt 2>/dev/null || echo "") requirements.txt 2>/dev/null && echo "(no changes)" || true
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # 4. Setup Python with caching
      # ------------------------------------------------------------------
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: python/requirements.txt

      # ------------------------------------------------------------------
      # 5. Install Python dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------------------
      # 6. Install Playwright browsers (Chromium headless)
      # ------------------------------------------------------------------
      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      # ------------------------------------------------------------------
      # 7. Inject environment variables from GitHub Secrets
      # ------------------------------------------------------------------
      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo ".env created successfully"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ------------------------------------------------------------------
      # 8. Run the scraping pipeline
      # ------------------------------------------------------------------
      - name: Run scraper pipeline
        id: scrape
        continue-on-error: false
        run: |
          echo "::group::Pipeline Execution"
          echo "Commit:     $(git rev-parse HEAD)"
          echo "Branch:     $(git rev-parse --abbrev-ref HEAD)"
          echo "Started at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Python:     $(python --version)"
          echo ""

          # Capture both stdout and stderr, tee to log
          python main.py 2>&1 | tee pipeline.log
          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "Finished at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Exit code: $EXIT_CODE"
          echo "::endgroup::"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Pipeline failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo "Pipeline completed successfully"

      # ------------------------------------------------------------------
      # 7. Upload pipeline logs as artifact (even on failure)
      # ------------------------------------------------------------------
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: python/logs/
          retention-days: 7
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # 8. Upload .env verification (sanitized — key not included)
      # ------------------------------------------------------------------
      - name: Verify configuration
        if: always()
        run: |
          echo "::group::Configuration Check"
          if [ -f .env ]; then
            URL_LEN=$(grep SUPABASE_URL .env | cut -d= -f2 | wc -c)
            KEY_LEN=$(grep SUPABASE_SERVICE_KEY .env | cut -d= -f2 | wc -c)
            echo "SUPABASE_URL:  ${URL_LEN} characters (set)"
            echo "SUPABASE_SERVICE_KEY: ${KEY_LEN} characters (set)"
          else
            echo "WARNING: .env file not found!"
          fi
          echo ""
          echo "Working directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # 9. Report summary
      # ------------------------------------------------------------------
      - name: Pipeline summary
        if: always()
        run: |
          echo "## AKR Scout — Scraper Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | $(git rev-parse --short HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | $(git rev-parse --abbrev-ref HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Date** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Duration** | ${{ github.run_attempt }} attempt(s) |" >> $GITHUB_STEP_SUMMARY

          if [ -f pipeline.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Log Preview (last 30 lines)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 pipeline.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
